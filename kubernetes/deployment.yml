# ─────────────────────────────────────────────
#  kubernetes/deployment.yml
#  Deploys NGINX app (image built by Jenkins)
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prt-devops-app
  namespace: default
  labels:
    app: prt-devops-app
    tier: frontend
    managed-by: jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prt-devops-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: prt-devops-app
        tier: frontend
    spec:
      containers:
        - name: prt-devops-app
          # ──────────────────────────────────────────────────────
          # Replace with your actual image:
          #   - If using a local registry:  localhost:5000/prt-devops-app:latest
          #   - If using Docker Hub:        yourdockerusername/prt-devops-app:latest
          #   - If no registry available:   use imagePullPolicy: Never and
          #     load image directly on each node with: docker save | ssh | docker load
          # ──────────────────────────────────────────────────────
          image: prt-devops-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
