# ─────────────────────────────────────────────
#  kubernetes/service.yml
#  Exposes prt-devops-app via NodePort
#  Access: http://<node-ip>:30080
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: prt-devops-app-service
  namespace: default
  labels:
    app: prt-devops-app
spec:
  type: NodePort
  selector:
    app: prt-devops-app
  ports:
    - name: http
      protocol: TCP
      port: 80          # Service port (cluster-internal)
      targetPort: 80    # Container port
      nodePort: 30080   # External access port (30000–32767)
