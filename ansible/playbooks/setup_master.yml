---
# ─────────────────────────────────────────────
#  ansible/playbooks/setup_master.yml
#  Installs: Java 17, Jenkins, Terraform
#  Target: devops-master
# ─────────────────────────────────────────────

- name: Configure devops-master (Jenkins + Terraform + Java)
  hosts: devops_master
  become: true
  vars:
    terraform_version: "1.8.5"
    jenkins_repo_key_url: "https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key"
    jenkins_repo: "deb https://pkg.jenkins.io/debian-stable binary/"

  tasks:

    # ── System Prerequisites ──────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisite packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - unzip
          - wget
        state: present

    # ── Java 17 ──────────────────────────────────────────────────
    - name: Install Java 17 (OpenJDK)
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Set JAVA_HOME in /etc/environment
      lineinfile:
        path: /etc/environment
        line: 'JAVA_HOME="/usr/lib/jvm/java-17-openjdk-amd64"'
        create: yes

    - name: Verify Java installation
      command: java -version
      register: java_version
      changed_when: false

    - name: Show Java version
      debug:
        msg: "{{ java_version.stderr }}"

    # ── Jenkins ──────────────────────────────────────────────────
    - name: Add Jenkins GPG key
      get_url:
        url: "{{ jenkins_repo_key_url }}"
        dest: /usr/share/keyrings/jenkins-keyring.asc
        mode: '0644'

    - name: Add Jenkins apt repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        state: present
        filename: jenkins

    - name: Update apt cache after adding Jenkins repo
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Start and enable Jenkins
      systemd:
        name: jenkins
        state: started
        enabled: yes

    - name: Wait for Jenkins to start (port 8080)
      wait_for:
        port: 8080
        delay: 10
        timeout: 120

    - name: Get Jenkins initial admin password
      command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password
      changed_when: false

    - name: Display Jenkins initial admin password
      debug:
        msg: "Jenkins Initial Admin Password: {{ jenkins_password.stdout }}"

    # ── Terraform ─────────────────────────────────────────────────
    - name: Download Terraform {{ terraform_version }}
      get_url:
        url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip"
        dest: /tmp/terraform.zip
        mode: '0644'

    - name: Unzip Terraform
      unarchive:
        src: /tmp/terraform.zip
        dest: /usr/local/bin/
        remote_src: yes
        mode: '0755'

    - name: Verify Terraform installation
      command: terraform version
      register: tf_version
      changed_when: false

    - name: Show Terraform version
      debug:
        msg: "{{ tf_version.stdout }}"

    # ── Ansible (ensure it's present on master) ───────────────────
    - name: Install Ansible
      apt:
        name: ansible
        state: present
