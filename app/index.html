<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Pipeline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050d1a;
      color: #e0f0ff;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow-orb {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,180,255,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)} }
    .container {
      position: relative; z-index: 10;
      text-align: center;
      padding: 56px 64px;
      border: 1px solid rgba(0,200,255,0.25);
      border-radius: 4px;
      background: rgba(5,20,40,0.85);
      backdrop-filter: blur(12px);
      max-width: 720px;
      box-shadow: 0 0 60px rgba(0,160,255,0.1), inset 0 0 40px rgba(0,160,255,0.03);
    }
    .container::before, .container::after {
      content: ''; position: absolute;
      width: 16px; height: 16px;
      border-color: #00c8ff; border-style: solid;
    }
    .container::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .container::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .label { font-size: 0.7rem; letter-spacing: 0.3em; color: #00c8ff; text-transform: uppercase; margin-bottom: 24px; opacity: 0.7; }
    h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.4rem, 4vw, 2rem); line-height: 1.4; color: #ffffff; text-shadow: 0 0 30px rgba(0,200,255,0.5); margin-bottom: 24px; }
    h1 span { color: #00c8ff; }
    .divider { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, #00c8ff, transparent); margin: 0 auto 24px; }
    p { font-size: 0.95rem; color: #7ab8d4; line-height: 1.8; margin-bottom: 32px; }
    .badges { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .badge { font-size: 0.65rem; letter-spacing: 0.15em; padding: 6px 14px; border: 1px solid rgba(0,200,255,0.3); border-radius: 2px; color: #00c8ff; text-transform: uppercase; background: rgba(0,200,255,0.05); }
    .status { margin-top: 32px; font-size: 0.75rem; color: #2ecc71; letter-spacing: 0.2em; }
    .status::before { content: '● '; animation: blink 1.5s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-orb"></div>
  <div class="container">
    <div class="label">// DevOps Pipeline — Output</div>
    <h1>Congratulations!<br/>You are <span>halfway done</span><br/>with the PRT. Keep going.</h1>
    <div class="divider"></div>
    <p>This page is served by NGINX inside a Docker container,<br/>
       built by Jenkins and deployed on Kubernetes.</p>
    <div class="badges">
      <span class="badge">Git</span>
      <span class="badge">Ansible</span>
      <span class="badge">Jenkins</span>
      <span class="badge">Docker</span>
      <span class="badge">Terraform</span>
      <span class="badge">Kubernetes</span>
    </div>
    <div class="status">PIPELINE SUCCESSFUL</div>
  </div>
</body>
</html>
